<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Roland-Morris 功能障礙問卷（RMDQ）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .instructions {
      margin-bottom: 20px;
      color: #444;
      line-height: 1.5;
    }

    .question {
      margin-bottom: 15px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }

    .question-title {
      margin-bottom: 8px;
      font-weight: 600;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #ccc;
      cursor: pointer;
      width: fit-content;
    }

    .option input {
      cursor: pointer;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      background: #1976d2;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #125a9c;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .modal-content {
      background: #fff;
      margin: 15% auto;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .close-btn {
      margin-top: 15px;
      padding: 10px 16px;
      background: #555;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .close-btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>盧倫摩理氏背痛問卷</h1>

  <div class="instructions">
    當你的腰背痛時，你可能會發現一些平常能做的事情變得困難。  
    以下列出一些人們在腰背痛時用來描述自己的句子。  
    <br><br>
    <strong>請在「今天符合你情況」的句子上打勾。</strong>
  </div>

  <div id="questions"></div>

  <button type="button" onclick="requestPassword()">展示給治療師</button>
</div>

<!-- Modal -->
<div id="scoreModal" class="modal">
  <div class="modal-content">
    <h2>你的 RMDQ 分數</h2>
    <p id="scoreText"></p>
    <p style="font-size:0.9rem; color:#555;">
      分數範圍：0（無功能障礙）至 24（最嚴重功能障礙）
    </p>
    <button class="close-btn" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
const items = [
  "因為腰背痛，我大部分時間都留在家裡。",
  "因為腰背痛，我經常變換姿勢以求舒適。",
  "因為腰背痛，我走路比平常慢。",
  "因為腰背痛，我無法做平常在家裡做的工作。",
  "因為腰背痛，我上樓梯時需要扶手。",
  "因為腰背痛，我需要更常躺下休息。",
  "因為腰背痛，我需要扶著東西才能從椅子上站起來。",
  "因為腰背痛，我會請別人幫我做事。",
  "因為腰背痛，我穿衣服比平常慢。",
  "因為腰背痛，我只能站很短的時間。",
  "因為腰背痛，我盡量避免彎腰或跪下。",
  "因為腰背痛，我覺得從椅子上站起來很困難。",
  "我的腰背幾乎一直都在痛。",
  "因為腰背痛，我轉身時感到困難。",
  "因為腰背痛，我的胃口變差。",
  "因為腰背痛，我穿襪子（或絲襪）時感到困難。",
  "因為腰背痛，我只能走短距離。",
  "因為腰背痛，我睡得不好。",
  "因為腰背痛，我需要別人幫我穿衣服。",
  "因為腰背痛，我大部分時間都坐著。",
  "因為腰背痛，我避免做家裡較重的工作。",
  "因為腰背痛，我比平常更容易發脾氣。",
  "因為腰背痛，我上樓梯比平常慢。",
  "因為腰背痛，我大部分時間都躺在床上。"
];

const questionsDiv = document.getElementById("questions");

items.forEach((text, index) => {
  const qNum = index + 1;

  const qDiv = document.createElement("div");
  qDiv.className = "question";

  const title = document.createElement("div");
  title.className = "question-title";
  title.textContent = `${qNum}. ${text}`;
  qDiv.appendChild(title);

  const label = document.createElement("label");
  label.className = "option";

  const input = document.createElement("input");
  input.type = "checkbox";
  input.name = `q${qNum}`;
  input.value = 1;

  label.appendChild(input);
  label.appendChild(document.createTextNode("若符合今天情況，請勾選"));
  qDiv.appendChild(label);

  questionsDiv.appendChild(qDiv);
});

function calculateRMDQ() {
  let total = 0;

  for (let i = 1; i <= 24; i++) {
    const checked = document.querySelector(`input[name="q${i}"]`).checked;
    if (checked) total++;
  }

  document.getElementById("scoreText").innerHTML =
    `<strong>${total}</strong> / 24`;

  document.getElementById("scoreModal").style.display = "block";
}

function requestPassword() {
  const pwd = prompt("請輸入密碼：");

  if (pwd === null) return;

  if (pwd === "225500") {
    calculateRMDQ();
  } else {
    alert("密碼錯誤，無法顯示分數。");
  }
}

function closeModal() {
  document.getElementById("scoreModal").style.display = "none";
}
</script>

</body>
</html>
